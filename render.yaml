# AI Fox Motors — Render Blueprint (Node backend + PostgreSQL)
services:
  - type: web
    name: ai-fox-motors-backend
    env: node
    plan: free
    rootDir: backend
    autoDeploy: true
    buildCommand: |
      npm install
      npx prisma generate
      npx prisma migrate deploy
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-fox-motors-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: LLM_MOCK
        value: "true"

databases:
  - name: ai-fox-motors-db
    plan: free
