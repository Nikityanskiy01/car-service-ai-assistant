# AI Fox Motors — Render Blueprint (Express + Prisma + PostgreSQL)
# Backend без локального Ollama: на Render задайте LLM_MOCK=true (уже ниже) или внешний OpenAI-compatible API.
services:
  - type: web
    name: ai-fox-motors-backend
    runtime: node
    plan: free
    rootDir: backend
    autoDeploy: true
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-fox-motors-db
          property: connectionString
      # Приложение не стартует без JWT_SECRET (см. backend/src/config/env.js)
      - key: JWT_SECRET
        generateValue: true
      # На Render недоступен http://127.0.0.1:11434 — включаем rule-based / mock-поток LLM
      - key: LLM_MOCK
        value: "true"

databases:
  - name: ai-fox-motors-db
    plan: free
