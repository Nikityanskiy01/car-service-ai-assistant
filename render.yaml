# AI Fox Motors — Render Blueprint (backend + static frontend + PostgreSQL)
# Статический сайт: в спецификации Render — type: web + runtime: static + staticPublishPath
services:
  - type: web
    name: ai-fox-motors-backend
    env: node
    plan: free
    rootDir: backend
    autoDeploy: true
    buildCommand: |
      npm install
      npx prisma generate
      npx prisma migrate deploy
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-fox-motors-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # На Render нет локального Ollama — сценарий без внешнего LLM API
      - key: LLM_MOCK
        value: "true"

  - type: web
    name: ai-fox-motors-frontend
    runtime: static
    plan: free
    rootDir: frontend
    autoDeploy: true
    buildCommand: npm install && npm run build
    staticPublishPath: dist

databases:
  - name: ai-fox-motors-db
    plan: free
