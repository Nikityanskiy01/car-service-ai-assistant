<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вход — AI Fox Motors</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/components.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>
    <main class="page container" style="max-width: 420px">
      <h1>С возвращением</h1>
      <p class="muted">Войдите, чтобы отслеживать заявки, сохранять отчёты и переписываться с менеджером.</p>
      <div id="formError" class="alert" role="alert"></div>
      <form id="loginForm" class="card">
        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="username" required />
        </div>
        <div class="form-field">
          <label for="password">Пароль</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn--primary" style="width: 100%">Войти</button>
      </form>
      <p class="muted" style="margin-top: 0.75rem">
        Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
      </p>
    </main>
    <div id="footer-placeholder"></div>
    <script type="module">
      import { mountHeaderFooter } from '/js/layout.js';
      import { initLogin } from '/js/auth.js';
      mountHeaderFooter({ active: 'home' });
      initLogin();
    </script>
  </body>
</html>
