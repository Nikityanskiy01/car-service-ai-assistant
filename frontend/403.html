<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Доступ ограничен — Fox Motors</title>
    <link rel="stylesheet" href="/css/tokens.css" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/utilities.css" />
    <link rel="stylesheet" href="/css/pages/error.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>
    <main class="page container">
      <section class="card error-page">
        <div class="error-page__header">
          <div>
            <h1 class="error-page__title">403</h1>
            <p class="lead error-page__subtitle">
              Эта страница доступна только после входа или с другой ролью.
            </p>
          </div>
          <div class="pill pill--bad">Доступ ограничен</div>
        </div>

        <div class="grid-2 error-page__body">
          <div>
            <p class="muted error-page__hint">
              Если вы только что вошли — обновите страницу. Если вы открыли ссылку на кабинет менеджера/админа, войдите
              под нужной учётной записью.
            </p>
            <div class="empty error-page__detail" id="err403Box"></div>
          </div>
          <div>
            <strong>Быстрые действия</strong>
            <div class="error-page__links--top">
              <a class="btn btn--primary" href="/login.html">Войти</a>
              <a class="btn btn--ghost" href="/register.html">Регистрация</a>
              <a class="btn btn--ghost" href="/index.html">На главную</a>
            </div>
          </div>
        </div>
      </section>
    </main>
    <div id="footer-placeholder"></div>
    <script type="module" src="/js/entry/error-403.js"></script>
  </body>
</html>
