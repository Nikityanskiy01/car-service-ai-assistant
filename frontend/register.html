<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Регистрация — AI Fox Motors</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/components.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>
    <main class="page container" style="max-width: 480px">
      <h1>Создадим аккаунт за минуту</h1>
      <p class="muted">Аккаунт нужен, чтобы хранить историю консультаций, отчёты и отслеживать статусы заявок.</p>
      <div id="formError" class="alert" role="alert"></div>
      <form id="registerForm" class="card">
        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div class="form-field">
          <label for="password">Пароль (мин. 8 символов)</label>
          <input id="password" name="password" type="password" minlength="8" required />
        </div>
        <div class="form-field">
          <label for="fullName">Имя и фамилия</label>
          <input id="fullName" name="fullName" required placeholder="Например: Никита Пойманов" />
        </div>
        <div class="form-field">
          <label for="phone">Телефон</label>
          <input id="phone" name="phone" type="tel" required placeholder="+7..." />
        </div>
        <button type="submit" class="btn btn--primary" style="width: 100%">Зарегистрироваться</button>
      </form>
      <p class="muted" style="margin-top: 0.75rem">
        Уже есть аккаунт? <a id="registerLoginLink" href="/login.html">Войти</a>
      </p>
    </main>
    <div id="footer-placeholder"></div>
    <script type="module">
      import { mountHeaderFooter } from '/js/layout.js';
      import { initRegister } from '/js/auth.js';
      mountHeaderFooter({ active: 'home' });
      initRegister();
    </script>
  </body>
</html>
