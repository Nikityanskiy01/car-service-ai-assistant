services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fox
      POSTGRES_PASSWORD: fox
      POSTGRES_DB: foxmotors
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d

volumes:
  pgdata:
